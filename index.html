<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學分計算系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 600px; margin-top: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .page { display: none; }
        .active { display: block; }
        .btn-custom { background-color: #6d8299; color: white; border-radius: 10px; }
        .btn-custom:hover { background-color: #5a6b7d; color: white; }
        .table-sm td, .table-sm th { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <!-- 主選單 -->
    <div id="page1" class="page active">
        <div class="card p-4 text-center">
            <h3 class="mb-4 text-secondary">學分進度管理系統</h3>
            <div class="d-grid gap-3">
                <button class="btn btn-custom py-3" onclick="showPage('page2')">高一學分輸入</button>
                <button class="btn btn-custom py-3" onclick="showPage('page3')">高二學分輸入</button>
                <button class="btn btn-custom py-3" onclick="showPage('page4')">高三學分輸入</button>
                <button class="btn btn-success py-3" onclick="calculateTotal()">查看畢業進度</button>
            </div>
            <div id="resultSummary" class="mt-4"></div>
        </div>
    </div>

    <!-- 頁面二：高一學分 -->
    <div id="page2" class="page">
        <button class="btn btn-sm btn-secondary mb-3" onclick="showPage('page1')">← 返回</button>
        <h4 class="text-center mb-3">高一學分 (一上/一下)</h4>
        <div id="g1_container"></div>
        <button class="btn btn-dark w-100 mb-5" onclick="showPage('page1')">儲存並返回</button>
    </div>

    <!-- 頁面三：高二學分 -->
    <div id="page3" class="page">
        <button class="btn btn-sm btn-secondary mb-3" onclick="showPage('page1')">← 返回</button>
        <h4 class="text-center mb-3">高二學分 (二上/二下)</h4>
        <div id="g2_container"></div>
        <button class="btn btn-dark w-100 mb-5" onclick="showPage('page1')">儲存並返回</button>
    </div>

    <!-- 頁面四：高三學分 -->
    <div id="page4" class="page">
        <button class="btn btn-sm btn-secondary mb-3" onclick="showPage('page1')">← 返回</button>
        <h4 class="text-center mb-3">高三學分 (三上/三下)</h4>
        <div id="g3_container"></div>
        <button class="btn btn-dark w-100 mb-5" onclick="showPage('page1')">儲存並返回</button>
    </div>
</div>

<script>
// --- 資料結構定義 ---
const data = {
    g1: {
        up: [
            {n: "國語文", c: 4}, {n: "英語文", c: 4}, {n: "數學", c: 4},
            {n: "歷史", c: 2}, {n: "物理", c: 2}, {n: "生物", c: 2},
            {n: "家政", c: 2}, {n: "生活科技", c: 2}, {n: "健康與護理", c: 2},
            {n: "體育", c: 2}, {n: "閩南語文", c: 1}
        ],
        dn: [
            {n: "國語文", c: 4}, {n: "英語文", c: 4}, {n: "數學", c: 4},
            {n: "地理", c: 2}, {n: "公民與社會", c: 2}, {n: "化學", c: 2},
            {n: "地球科學", c: 2}, {n: "美術", c: 2}, {n: "資訊科技", c: 2},
            {n: "體育", c: 2}, {n: "閩南語文", c: 1}
        ]
    },
    g2: {
        up: [
            {n: "國語文", c: 4}, {n: "英語文", c: 4}, {n: "數學A", c: 4},
            {n: "歷史", c: 2}, {n: "地理", c: 2}, {n: "公民與社會", c: 2},
            {n: "物理-探究A", c: 2}, {n: "美術", c: 2}, {n: "體育", c: 2},
            {n: "國學常識", c: 2}, {n: "歷史學探究", c: 2}, {n: "地理與人文", c: 2}
        ],
        dn: [
            {n: "國語文", c: 4}, {n: "英語文", c: 4}, {n: "數學A", c: 4},
            {n: "歷史", c: 2}, {n: "地理", c: 2}, {n: "公民與社會", c: 2},
            {n: "化學-探究B", c: 2}, {n: "音樂", c: 2}, {n: "體育", c: 2},
            {n: "各類文學選讀", c: 2}, {n: "公共議題與社會", c: 2}, {n: "日語", c: 2}
        ]
    },
    g3: {
        up: [
            {n: "國語文", c: 4}, {n: "英語文", c: 2}, {n: "音樂", c: 1},
            {n: "藝術生活", c: 1}, {n: "生涯規劃", c: 1}, {n: "體育", c: 2},
            {n: "全民國防教育", c: 1}, {n: "英文作文", c: 2}, {n: "數學乙", c: 4},
            {n: "族群、性別與國家歷史", c: 3}, {n: "空間資訊科技", c: 3}, {n: "現代社會與經濟", c: 3}
        ],
        dn: [
            {n: "國語文", c: 4}, {n: "英語文", c: 2}, {n: "美術", c: 1},
            {n: "藝術生活", c: 1}, {n: "法律與生活", c: 1}, {n: "體育", c: 2},
            {n: "全民國防教育", c: 1}, {n: "英文讀本", c: 2}, {n: "數學乙", c: 4},
            {n: "文獻與歷史探究", c: 3}, {n: "區域地理", c: 3}, {n: "民主政治", c: 3}
        ]
    }
};

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function renderTables() {
    // 渲染高一
    renderGrade('g1', 'g1_container', '臥龍學：文化1', '臥龍學：溝通1', '臥龍學：邏輯3', '臥龍學：文化2');
    // 渲染高二 (多元選修一學期兩個)
    renderGradeG2('g2', 'g2_container');
    // 渲染高三 (一學期多元+加深各一)
    renderGradeG3('g3', 'g3_container');
}

function renderGrade(gradeKey, containerId, s1, s2, s3, s4) {
    const container = document.getElementById(containerId);
    container.innerHTML = `
        <div class="card mb-3 p-3">
            <h6 class="fw-bold">上學期 (必修)</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].up, gradeKey + 'u')}</table>
            <h6 class="fw-bold">校定必修 (1.0x2)</h6>
            <input type="number" class="form-control form-control-sm mb-1" placeholder="${s1}">
            <input type="number" class="form-control form-control-sm mb-1" placeholder="${s2}">
            <h6 class="fw-bold">多元選修 (2.0)</h6>
            <input type="number" class="form-control form-control-sm" placeholder="多元課程名稱">
        </div>
        <div class="card mb-3 p-3">
            <h6 class="fw-bold">下學期 (必修)</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].dn, gradeKey + 'd')}</table>
            <h6 class="fw-bold">校定必修 (1.0x2)</h6>
            <input type="number" class="form-control form-control-sm mb-1" placeholder="${s3}">
            <input type="number" class="form-control form-control-sm mb-1" placeholder="${s4}">
            <h6 class="fw-bold">多元選修 (2.0)</h6>
            <input type="number" class="form-control form-control-sm" placeholder="多元課程名稱">
        </div>
    `;
}

function renderGradeG2(gradeKey, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = `
        <div class="card mb-3 p-3 border-info">
            <h6 class="fw-bold">二上 必修與加深加廣</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].up, 'g2u')}</table>
            <h6 class="fw-bold">多元選修 (2.0 x 2)</h6>
            <input type="number" class="form-control form-control-sm mb-1" placeholder="選修課程 A">
            <input type="number" class="form-control form-control-sm" placeholder="選修課程 B">
        </div>
        <div class="card mb-3 p-3 border-warning">
            <h6 class="fw-bold">二下 必修與加深加廣</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].dn, 'g2d')}</table>
            <h6 class="fw-bold">多元選修 (2.0 x 2)</h6>
            <input type="number" class="form-control form-control-sm mb-1" placeholder="選修課程 C">
            <input type="number" class="form-control form-control-sm" placeholder="選修課程 D">
        </div>
    `;
}

function renderGradeG3(gradeKey, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = `
        <div class="card mb-3 p-3 border-danger">
            <h6 class="fw-bold text-danger">三上 必修與選修 (對應 p1, p2)</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].up, 'g3u')}</table>
            <h6 class="fw-bold">自選項目</h6>
            <div class="input-group input-group-sm mb-1">
                <span class="input-group-text">多元選修(2.0)</span>
                <input type="number" class="form-control" placeholder="成績">
            </div>
            <div class="input-group input-group-sm">
                <span class="input-group-text">領域專題(1.0)</span>
                <input type="number" class="form-control" placeholder="成績">
            </div>
        </div>
        <div class="card mb-3 p-3 border-dark">
            <h6 class="fw-bold">三下 必修與選修</h6>
            <table class="table table-sm">${generateRows(data[gradeKey].dn, 'g3d')}</table>
            <h6 class="fw-bold">自選項目</h6>
            <div class="input-group input-group-sm mb-1">
                <span class="input-group-text">多元選修(2.0)</span>
                <input type="number" class="form-control" placeholder="成績">
            </div>
            <div class="input-group input-group-sm">
                <span class="input-group-text">加深加廣(1.0)</span>
                <input type="number" class="form-control" placeholder="成績">
            </div>
        </div>
    `;
}

function generateRows(list, prefix) {
    return list.map((s, i) => `
        <tr><td>${s.n}</td><td class="text-muted small">${s.c}</td>
        <td width="80"><input type="number" class="form-control form-control-sm" min="0" max="100"></td></tr>
    `).join('');
}

function calculateTotal() {
    alert("儲存成功！目前系統已記錄您高一至高三的學分結構。");
}

document.addEventListener('DOMContentLoaded', renderTables);
</script>
</body>
</html>
